<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Wordle</title>
  </head>
  <body>
      <div class="modal">
          <div class="modal-content">
              <span class="close-btn">&times;</span>
              <h1 class="modal-h1"></h1>
          </div>
      </div>
    <div class="navBar">
      <ul>
        <li>🍔</li>
        <li>❓</li>
        <li class="title">Wordle</li>
        <li>📊</li>
        <li>&#9881;</li>
      </ul>
    </div>
    <div class="topContainer">
      <div class="tiles">
        <div class="tile word1 tile1"></div>
        <div class="tile word1 tile2"></div>
        <div class="tile word1 tile3"></div>
        <div class="tile word1 tile4"></div>
        <div class="tile word1 tile5"></div>

        <div class="tile word2 tile1"></div>
        <div class="tile word2 tile2"></div>
        <div class="tile word2 tile3"></div>
        <div class="tile word2 tile4"></div>
        <div class="tile word2 tile5"></div>
   
        <div class="tile word3 tile1"></div>
        <div class="tile word3 tile2"></div>
        <div class="tile word3 tile3"></div>
        <div class="tile word3 tile4"></div>
        <div class="tile word3 tile5"></div>
        <div class="tile word4 tile1"></div>
        <div class="tile word4 tile2"></div>
        <div class="tile word4 tile3"></div>
        <div class="tile word4 tile4"></div>
        <div class="tile word4 tile5"></div>
        <div class="tile word5 tile1"></div>
        <div class="tile word5 tile2"></div>
        <div class="tile word5 tile3"></div>
        <div class="tile word5 tile4"></div>
        <div class="tile word5 tile5"></div>
        <div class="tile word6 tile1"></div>
        <div class="tile word6 tile2"></div>
        <div class="tile word6 tile3"></div>
        <div class="tile word6 tile4"></div>
        <div class="tile word6 tile5"></div>
      </div>
    </div>

    <div class="bottomContainer">
      <div class="keyboard">
        <div class="firstRow">
          <div class="key q">Q</div>
          <div class="key w">W</div>
          <div class="key e">E</div>
          <div class="key r">R</div>
          <div class="key t">T</div>
          <div class="key y">Y</div>
          <div class="key u">U</div>
          <div class="key i">I</div>
          <div class="key o">O</div>
          <div class="key p">P</div>
        </div>
        <div class="secondRow">
          <div class="key a">A</div>
          <div class="key s">S</div>
          <div class="key d">D</div>
          <div class="key f">F</div>
          <div class="key g">G</div>
          <div class="key h">H</div>
          <div class="key j">J</div>
          <div class="key k">K</div>
          <div class="key l">L</div>
        </div>
        <div class="thirdRow">
          <div class="enter">ENTER</div>
          <div class="key z">Z</div>
          <div class="key x">X</div>
          <div class="key c">C</div>
          <div class="key v">V</div>
          <div class="key b">B</div>
          <div class="key n">N</div>
          <div class="key m">M</div>
          <div class="return">&#9166;</div>
        </div>
      </div>
    </div>

    <script src="./index.js" type="module"></script>
  </body>
</html>
